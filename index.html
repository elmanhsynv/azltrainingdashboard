<!DOCTYPE html>
<html lang="az" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZL Training System - Elite v5.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        :root { --primary: #3b82f6; }
        body { transition: 0.4s; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); color: #1e293b; overflow-x: hidden; }
        .dark body { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); color: #f1f5f9; }
        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); border-radius: 2rem; background: rgba(255, 255, 255, 0.85); transition: all 0.3s ease; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.7); border-color: rgba(255, 255, 255, 0.08); }
        .stat-card { position: relative; overflow: hidden; border: none !important; transition: all 0.4s ease; }
        .stat-card:hover { transform: translateY(-8px); }
        .stat-card i { position: absolute; right: -15px; bottom: -15px; font-size: 6rem; opacity: 0.15; color: white; }
        .nav-btn { padding: 0.8rem 1.5rem; margin: 4px 0; font-size: 14px; display: flex; align-items: center; gap: 12px; border-radius: 1rem; color: #64748b; transition: 0.3s; }
        .nav-active { background: var(--primary) !important; color: white !important; box-shadow: 0 8px 20px -5px rgba(59, 130, 246, 0.4); }
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .section-content { display: none; width: 100%; }
        .section-content.active { display: block; }
        .check-btn-v4 { width: 50px; height: 45px; border-radius: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; }
        .btn-success-active { background: #10b981 !important; color: white !important; }
        .btn-danger-active { background: #ef4444 !important; color: white !important; }

        /* XƏRİTƏ ÜÇÜN MÜTLƏQ HÜNDÜRLÜK */
        #map { 
            height: 500px !important; 
            width: 100%; 
            border-radius: 2rem; 
            z-index: 1;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden flex-col md:flex-row">

    <div id="auth-screen">
        <div class="auth-card glass-card shadow-2xl p-10 w-full max-w-[420px]">
            <div class="text-center mb-8">
                <div class="inline-flex p-4 bg-blue-50 rounded-3xl mb-4"><i class="fa-solid fa-shield-halved text-4xl text-blue-600"></i></div>
                <h2 class="text-3xl font-black text-slate-800">AZL <span class="text-blue-600">Training</span></h2>
            </div>
            <div id="login-form" class="space-y-4">
                <input type="text" id="login-phone" placeholder="Mobil nömrə" class="w-full p-4 rounded-2xl border border-slate-200 font-bold outline-none">
                <input type="password" id="login-pass" placeholder="Şifrə" class="w-full p-4 rounded-2xl border border-slate-200 font-bold outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black uppercase tracking-widest">Giriş et</button>
                <p class="text-center text-[11px] font-bold text-slate-500">Hesabınız yoxdur? <span onclick="toggleAuth(false)" class="text-blue-600 cursor-pointer">Yeni qeydiyyat</span></p>
            </div>
            <div id="register-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-name" placeholder="Ad" class="p-4 rounded-xl border border-slate-200 font-bold">
                    <input type="text" id="reg-surname" placeholder="Soyad" class="p-4 rounded-xl border border-slate-200 font-bold">
                </div>
                <input type="text" id="reg-phone" placeholder="Mobil nömrə" class="w-full p-4 rounded-xl border border-slate-200 font-bold">
                <input type="password" id="reg-pass" placeholder="Şifrə" class="w-full p-4 rounded-xl border border-slate-200 font-bold">
                <button onclick="handleRegister()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black uppercase">Təsdiqlə</button>
                <p class="text-center text-[11px] font-bold text-slate-500"><span onclick="toggleAuth(true)" class="text-blue-600 cursor-pointer">Geri dön</span></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="main-container h-full w-full flex flex-col md:flex-row">
        <aside class="w-full md:w-72 bg-white dark:bg-[#020617] border-r border-slate-200 dark:border-white/5 h-auto md:h-full flex flex-col p-8 z-50">
            <div class="mb-12 flex items-center gap-1 cursor-pointer"><span class="font-black text-2xl text-blue-600">AZL</span><span class="font-medium text-2xl dark:text-white ml-1">Training</span></div>
            <nav class="flex md:flex-col w-full gap-1 flex-1">
                <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-btn nav-active"><i class="fa-solid fa-chart-pie"></i> <span data-i18n="nav_home">Dashboard</span></button>
                <button onclick="showSection('checklist')" id="nav-checklist" class="nav-btn"><i class="fa-solid fa-list-check"></i> <span data-i18n="nav_checklist">Checklist</span></button>
                <button onclick="showSection('ziyaretler')" id="nav-visits" class="nav-btn"><i class="fa-solid fa-map-location-dot"></i> <span data-i18n="nav_visits">Ziyarətlər</span></button>
                <button onclick="showSection('ayarlar')" id="nav-settings" class="nav-btn"><i class="fa-solid fa-sliders"></i> <span data-i18n="nav_settings">Ayarlar</span></button>
            </nav>
            <div class="mt-auto pt-6 border-t border-slate-100">
                <button onclick="logout()" class="w-full text-slate-400 py-3 rounded-2xl font-bold text-[11px] flex items-center justify-center gap-2 mb-4"><i class="fas fa-sign-out-alt"></i> Çıxış et</button>
                <button onclick="openNewChecklist()" class="w-full bg-blue-600 text-white py-4 rounded-2xl shadow-xl font-black text-xs uppercase flex items-center justify-center gap-3"><i class="fas fa-plus-circle text-lg"></i> Yeni Checklist</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 relative">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 id="page-title" class="text-3xl font-black dark:text-white uppercase text-blue-600 tracking-tighter">PERFORMANS ANALİZİ</h1>
                    <p id="current-date" class="text-[11px] font-black text-slate-400 mt-1"></p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" class="p-4 glass-card bg-white dark:bg-white/5 shadow-sm"><i id="mode-icon" class="fas fa-sun text-amber-500"></i></button>
                    <select id="rep-selector" onchange="updateDashboard()" class="glass-card px-6 py-3 font-black text-xs min-w-[220px]">
                        <option value="">Bütün Nümayəndələr</option>
                        <option value="Zaur Xalinbekov">Zaur Xalinbekov</option>
                        <option value="Anar Babayev">Anar Babayev</option>
                        <option value="Emil Hüseynov">Emil Hüseynov</option>
                        <option value="Təvəkkül Abdullayev">Təvəkkül Abdullayev</option>
                        <option value="Loğman Əliyev">Loğman Əliyev</option>
                    </select>
                </div>
            </header>

            <div id="dashboard" class="section-content active space-y-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="stat-card glass-card p-8 bg-gradient-to-br from-blue-600 to-blue-500 text-white">
                        <p class="text-[10px] font-black uppercase mb-2">Ortalama Bal</p>
                        <h3 id="rep-avg-stat" class="text-4xl font-black">0</h3><i class="fa-solid fa-star"></i>
                    </div>
                    <div class="stat-card glass-card p-8 bg-gradient-to-br from-emerald-600 to-emerald-500 text-white">
                        <p class="text-[10px] font-black uppercase mb-2">Ən Yüksək Bal</p>
                        <h3 id="last-point-score" class="text-4xl font-black">0</h3><i class="fa-solid fa-ranking-star"></i>
                    </div>
                    <div class="stat-card glass-card p-8 bg-gradient-to-br from-amber-500 to-orange-400 text-white">
                        <p class="text-[10px] font-black uppercase mb-2">Ziyarət Sayı</p>
                        <h3 id="total-visits-stat" class="text-4xl font-black">0</h3><i class="fa-solid fa-person-walking-luggage"></i>
                    </div>
                    <div class="stat-card glass-card p-8 bg-gradient-to-br from-rose-500 to-pink-500 text-white">
                        <p class="text-[10px] font-black uppercase mb-2">İnkişaf Trendi</p>
                        <h3 id="trend-stat" class="text-4xl font-black">0%</h3><i class="fa-solid fa-chart-line"></i>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 glass-card p-8 min-h-[450px]"><canvas id="rankingChart"></canvas></div>
                    <div class="glass-card p-8"><canvas id="radarChart"></canvas></div>
                </div>
            </div>

            <div id="checklist" class="section-content">
                <div id="checklist-history-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-6xl mx-auto"></div>
            </div>

            <div id="new-checklist-form" class="section-content">
                <div class="max-w-4xl mx-auto space-y-8 pb-32">
                    <div class="glass-card p-8 shadow-sm">
                        <label class="block text-xs font-black text-blue-600 uppercase mb-4">Satış Nöqtəsi Kodu:</label>
                        <input type="text" id="point-code-input" placeholder="Məs: 11604.0001" class="w-full bg-slate-50 p-6 rounded-2xl font-black text-2xl outline-none">
                    </div>
                    <div id="dynamic-questions" class="space-y-8"></div>
                    <div class="glass-card p-10 flex gap-6 shadow-2xl">
                        <button id="geo-btn" onclick="getLocation()" class="flex-1 bg-amber-500 text-white font-black p-6 rounded-3xl">Check-in et</button>
                        <button onclick="processAndSave()" class="flex-1 bg-blue-600 text-white font-black p-6 rounded-3xl uppercase">Saxla və Bitir</button>
                    </div>
                </div>
            </div>
            
            <div id="ayarlar" class="section-content">
                <div class="max-w-2xl mx-auto glass-card p-12 space-y-8 text-center">
                    <h2 class="text-3xl font-black text-blue-600">PROFİL VƏ AYARLAR</h2>
                    <img id="profile-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-36 h-36 mx-auto rounded-[3rem] border-4 border-blue-500 p-1">
                    <button onclick="logout()" class="w-full bg-rose-500 text-white p-4 rounded-xl font-black">SİSTEMDƏN ÇIXIŞ</button>
                </div>
            </div>

            <div id="ziyaretler" class="section-content">
                <div class="glass-card p-6 shadow-2xl">
                    <div id="map"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBBP5rDA_iLkwLGswMI8gAaTzpgqKQ5rf4",
            authDomain: "azl-training.firebaseapp.com",
            databaseURL: "https://azl-training-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "azl-training",
            storageBucket: "azl-training.firebasestorage.app",
            messagingSenderId: "467979610103",
            appId: "1:467979610103:web:c1ca6e75aa4116cd73b0f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('azl_user')) || null;
        let database = {}; 
        let rankingChart, radarChart, map;
        let currentCoords = null;

        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('az-AZ', { day: 'numeric', month: 'long', year: 'numeric' }).format(new Date());

        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
        }

        async function handleRegister() {
            const phone = document.getElementById('reg-phone').value.trim().replace(/\s+/g, '');
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            if(!phone || !pass) return alert("Məlumatları tam daxil edin.");
            await db.ref('users/' + phone).set({ name, phone, pass });
            alert("Qeydiyyat tamamlandı!"); toggleAuth(true);
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim().replace(/\s+/g, '');
            const pass = document.getElementById('login-pass').value;
            try {
                const snap = await db.ref('users').child(phone).once('value');
                const user = snap.val();
                if(user && user.pass === pass) {
                    currentUser = user;
                    localStorage.setItem('azl_user', JSON.stringify({name: user.name, phone: user.phone}));
                    initApp();
                } else alert("Məlumatlar yanlışdır.");
            } catch(e) { alert("Giriş xətası!"); }
        }

        function logout() { localStorage.removeItem('azl_user'); location.reload(); }

        function initApp() {
            document.getElementById('auth-screen').style.display = 'none';
            db.ref('visits').on('value', snap => {
                const data = snap.val();
                database = {};
                if(data) Object.values(data).forEach(v => {
                    if(!database[v.rep]) database[v.rep] = [];
                    database[v.rep].push(v);
                });
                updateDashboard();
            });
        }

        function updateDashboard() {
            const selectedRep = document.getElementById('rep-selector').value;
            let allVisits = [];
            Object.values(database).forEach(v => allVisits = allVisits.concat(v));
            allVisits.sort((a,b) => b.timestamp - a.timestamp);

            const filtered = selectedRep ? (database[selectedRep] || []) : allVisits;

            document.getElementById('total-visits-stat').innerText = filtered.length;
            const avg = filtered.length ? (filtered.reduce((a,b) => a + b.score, 0) / filtered.length).toFixed(0) : 0;
            document.getElementById('rep-avg-stat').innerText = avg;
            document.getElementById('last-point-score').innerText = filtered.length ? Math.max(...filtered.map(v => v.score)) : 0;

            updateCharts(selectedRep, filtered);
            renderHistory(filtered);
        }

        function updateCharts(repName, filtered) {
            const ctxR = document.getElementById('rankingChart').getContext('2d');
            const labels = Object.keys(database);
            const scores = labels.map(r => (database[r].reduce((a,b)=>a+b.score,0)/database[r].length).toFixed(1));

            if(rankingChart) rankingChart.destroy();
            rankingChart = new Chart(ctxR, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Ortalama', data: scores, backgroundColor: '#3b82f6', borderRadius: 10 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            const radarData = filtered.length ? filtered[0].catData : [0,0,0,0,0];
            if(radarChart) radarChart.destroy();
            radarChart = new Chart(ctxRadar, {
                type: 'radar',
                data: { labels:['4+4','B.Beş','S.Keno','Poz-Q','Term'], datasets:[{ data:radarData, backgroundColor:'rgba(59,130,246,0.2)', borderColor:'#3b82f6' }] },
                options: { scales: { r: { min: 0, max: 100 } } }
            });
        }

        function renderHistory(entries) {
            const list = document.getElementById('checklist-history-list');
            list.innerHTML = entries.map(e => `
                <div class="glass-card p-6 flex justify-between items-center">
                    <div>
                        <p class="font-black text-blue-600 text-xl">${e.code}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${e.rep} • ${e.date}</p>
                    </div>
                    <div class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl font-black">${e.score}</div>
                </div>
            `).join('');
        }

        function showSection(id) {
            // BÖLMƏLƏRİ GİZLƏ VƏ AKTİV ET
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // MENYU DÜYMƏLƏRİNİ YENİLƏ
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            const btn = document.getElementById('nav-' + id);
            if(btn) btn.classList.add('nav-active');

            // XƏRİTƏ BÖLMƏSİDİRSƏ, GECİKMƏ İLƏ BAŞLAT
            if(id === 'ziyaretler') {
                setTimeout(() => {
                    initMap();
                }, 400);
            }
        }

        function initMap() {
            // Əgər əvvəl xəritə yaradılıbsa, onu silirik
            if(map) { map.remove(); }

            // Xəritəni Bakı koordinatları ilə başladırıq
            map = L.map('map').setView([40.4093, 49.8671], 11);

            // Xəritənin şəkillərini yükləyirik
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            // Bütün ziyarətləri marker kimi əlavə et
            Object.values(database).flat().forEach(e => {
                if(e.coords && e.coords.lat) {
                    L.marker([e.coords.lat, e.coords.lng]).addTo(map).bindPopup(`<b>${e.rep}</b><br>${e.code}`);
                }
            });

            // Ölçüləri yenidən hesabla
            map.invalidateSize();
        }

        function openNewChecklist() { showSection('new-checklist-form'); renderForm(); }
        
        function renderForm() {
            const schema = [
                { cat: "4+4 Oyunu", questions: ["Oyun qaydalarını bilir?", "Cekpotu tanıyır?"] },
                { cat: "Terminal", questions: ["Hesabat çıxara bilir?", "Ləğv edə bilir?"] }
            ];
            let h = "";
            schema.forEach((group, gIdx) => {
                h += `<div class="glass-card p-8"><h3 class="font-black text-blue-600 mb-4">${group.cat}</h3>`;
                group.questions.forEach((q, qIdx) => {
                    h += `<div class="flex justify-between items-center py-4 border-b">
                        <p class="font-bold">${q}</p>
                        <div class="flex gap-2">
                            <button onclick="this.className='w-10 h-10 rounded bg-green-500 text-white'" class="w-10 h-10 border rounded">Y</button>
                            <button onclick="this.className='w-10 h-10 rounded bg-red-500 text-white'" class="w-10 h-10 border rounded">X</button>
                        </div>
                    </div>`;
                });
                h += `</div>`;
            });
            document.getElementById('dynamic-questions').innerHTML = h;
        }

        function processAndSave() {
            const code = document.getElementById('point-code-input').value;
            const rep = document.getElementById('rep-selector').value || "Anonim";
            const visit = { rep, code, score: 85, date: new Date().toLocaleDateString('az-AZ'), timestamp: Date.now(), catData: [80, 75, 90, 85, 70], coords: currentCoords };
            db.ref('visits').push(visit).then(() => showSection('dashboard'));
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geo-btn').innerText = "📍 MƏKAN OK";
                    document.getElementById('geo-btn').classList.add('bg-green-600');
                });
            }
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        window.onload = () => { if(currentUser) initApp(); };
    </script>
</body>
</html>
