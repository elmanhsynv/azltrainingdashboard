        .dark body { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); color: #f1f5f9; }
        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); border-radius: 2rem; background: rgba(255, 255, 255, 0.85); transition: all 0.3s ease; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.7); border-color: rgba(255, 255, 255, 0.08); }
        .stat-card { position: relative; overflow: hidden; border: none !important; transition: all 0.4s ease; }
        .stat-card:hover { transform: translateY(-8px); }
        .stat-card i { position: absolute; right: -15px; bottom: -15px; font-size: 6rem; opacity: 0.15; color: white; }
        .nav-btn { padding: 0.8rem 1.5rem; margin: 4px 0; font-size: 14px; display: flex; align-items: center; gap: 12px; border-radius: 1rem; color: #64748b; transition: 0.3s; }

        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .section-content { display: none; width: 100%; }
        .section-content.active { display: block; }
        
        #map { height: 400px !important; width: 100%; border-radius: 2rem; z-index: 1; }
        
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Checklist Styles */
        .check-btn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: #cbd5e1; }
        .check-btn.active-y { background: #dcfce7; border-color: #4ade80; color: #166534; }
        .check-btn.active-x { background: #fee2e2; border-color: #f87171; color: #991b1b; }

        /* Sidebar & Menu Fixes */
        #mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; backdrop-filter: blur(4px); }
        aside { position: fixed; transform: translateX(-100%); z-index: 9999; height: 100vh; width: 280px; transition: transform 0.3s ease-in-out; }

            .mobile-header { display: flex !important; }
        }
        
        .dashboard-header-fix { margin-top: 10px; }

                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end;
                }
            };
            window.requestAnimationFrame(step);
        }

        function updateDashboard() {
            const selectedRep = document.getElementById('rep-selector').value;
            let allVisits = [];
            Object.values(database).forEach(v => allVisits = allVisits.concat(v));
            allVisits.sort((a,b) => b.timestamp - a.timestamp);
            const filtered = selectedRep ? (database[selectedRep] || []) : allVisits;

            // Slot Animations
            const totalVisits = filtered.length;
            const avg = totalVisits ? (filtered.reduce((a,b) => a + b.score, 0) / totalVisits).toFixed(0) : 0;
            const maxScore = totalVisits ? Math.max(...filtered.map(v => v.score)) : 0;

            animateValue('total-visits-stat', 0, totalVisits, 1000);
            animateValue('rep-avg-stat', 0, parseInt(avg), 1000);
            animateValue('last-point-score', 0, parseInt(maxScore), 1000);

            updateCharts(selectedRep, filtered);
            renderHistory(filtered);
        }

        function generateInternalReport() {
            const dateVal = document.getElementById('report-date').value;
            if(!dateVal) return;
            const selectedDate = new Date(dateVal);
            if(reportType === 'weekly' && selectedDate.getDay() !== 1) {
                document.getElementById('internal-report-results').innerHTML = `<div class="p-6 bg-rose-50 rounded-3xl text-center text-rose-600 font-bold text-xs">Bazar ertəsini seçin</div>`;
                return;
            }
            let filtered = [];
            const allVisits = Object.values(database).flat();
            if(reportType === 'daily') {
                const targetStr = selectedDate.toLocaleDateString('az-AZ');
                filtered = allVisits.filter(v => v.date === targetStr);
            } else {
                const startOfWeek = new Date(selectedDate);
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(startOfWeek.getDate() + 6);
                filtered = allVisits.filter(v => {
                    const vDate = new Date(v.timestamp);
                    return vDate >= startOfWeek && vDate <= endOfWeek;
                });
            }
            const resultsDiv = document.getElementById('internal-report-results');
            if(filtered.length === 0) {
                resultsDiv.innerHTML = `<div class="p-6 bg-slate-50 dark:bg-slate-800 rounded-3xl text-center text-slate-400 font-bold text-xs">Məlumat tapılmadı</div>`;
            } else {
                resultsDiv.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl text-center">
                            <p class="text-[8px] font-black text-blue-600 uppercase">Ziyarət</p>
                            <h5 class="text-xl font-black text-blue-600">${filtered.length}</h5>
                        </div>
                        <div class="p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl text-center">
                            <p class="text-[8px] font-black text-emerald-600 uppercase">Ortalama</p>
                            <h5 class="text-xl font-black text-emerald-600">${(filtered.reduce((a,b)=>a+b.score,0)/filtered.length).toFixed(0)}</h5>
                        </div>
                    </div>`;
            }
        }

            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Report_${rep}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        // Dinamik hesablamanın həyata keçirilməsi
        function processAndSave() {
            const code = document.getElementById('point-code-input').value;
            if(!code) return alert("Satış nöqtəsinin kodunu daxil edin!");

            let totalPoints = 0;
            let questionCount = 0;
            let categoryAverages = [0, 0, 0, 0, 0]; // Radar üçün ilk 5 kateqoriya
            
            // Xalların toplanması
            for (let cIdx = 0; cIdx < 10; cIdx++) {
                let catTotal = 0;
                let catCount = 0;
                
                if (currentChecklistState[cIdx]) {
                    Object.values(currentChecklistState[cIdx]).forEach(score => {
                        catTotal += score;
                        catCount++;
                        totalPoints += score;
                        questionCount++;
                    });
                }
                
                // İlk 5 kateqoriyanı Radar Chart üçün yığırıq
                if (cIdx < 5) {
                    categoryAverages[cIdx] = catCount > 0 ? (catTotal / catCount) : 0;
                }
            }

            const finalScore = questionCount > 0 ? Math.round(totalPoints / questionCount) : 0;
            const rep = currentUser.fullName || currentUser.name || "Anonim";
            
            const visit = { 
                rep, 
                code, 
                score: finalScore, 
                date: new Date().toLocaleDateString('az-AZ'), 
                timestamp: Date.now(), 
                catData: categoryAverages, 
                coords: currentCoords 
            };
            
            db.ref('visits').push(visit).then(() => {
                alert(`Məlumatlar yadda saxlanıldı! Yekun Bal: ${finalScore}`);
                showSection('dashboard');
                document.getElementById('point-code-input').value = ""; // Formu təmizləyirik
            });
        }
