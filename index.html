<!DOCTYPE html>
<html lang="az" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZL Training Dashboard 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        :root { --primary: #3b82f6; }
        body { transition: 0.4s; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); color: #1e293b; overflow-x: hidden; }
        .dark body { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); color: #f1f5f9; }
        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); border-radius: 2rem; background: rgba(255, 255, 255, 0.85); transition: all 0.3s ease; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.7); border-color: rgba(255, 255, 255, 0.08); }
        .stat-card { position: relative; overflow: hidden; border: none !important; transition: all 0.4s ease; }
        .stat-card:hover { transform: translateY(-8px); }
        .stat-card i { position: absolute; right: -15px; bottom: -15px; font-size: 6rem; opacity: 0.15; color: white; }
        .nav-btn { padding: 0.8rem 1.5rem; margin: 4px 0; font-size: 14px; display: flex; align-items: center; gap: 12px; border-radius: 1rem; color: #64748b; transition: 0.3s; }
        .nav-active { background: var(--primary) !important; color: white !important; box-shadow: 0 8px 20px -5px rgba(59, 130, 246, 0.4); }
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .section-content { display: none; width: 100%; }
        .section-content.active { display: block; }
        
        #map { height: 400px !important; width: 100%; border-radius: 2rem; z-index: 1; }
        
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Checklist Styles */
        .check-btn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: #cbd5e1; }
        .check-btn.active-y { background: #dcfce7; border-color: #4ade80; color: #166534; }
        .check-btn.active-x { background: #fee2e2; border-color: #f87171; color: #991b1b; }

        /* Sidebar & Menu Fixes */
        #mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; backdrop-filter: blur(4px); }
        aside { position: fixed; transform: translateX(-100%); z-index: 9999; height: 100vh; width: 280px; transition: transform 0.3s ease-in-out; }
        aside.open { transform: translateX(0); }
        #mobile-overlay.open { display: block; }
        
        .mobile-header { position: fixed; top: 0; left: 0; right: 0; z-index: 9990; background: white; border-bottom: 1px solid #e2e8f0; height: 75px; display: flex; align-items: center; padding: 0 24px; }
        .dark .mobile-header { background: #020617; border-color: rgba(255,255,255,0.05); }

        /* Mobile Layout Fix */
        @media (max-width: 768px) {
            main { padding-top: 110px !important; }
            .dashboard-header-fix { margin-top: 15px !important; }
        }

        /* Laptop version fix */
        @media (min-width: 769px) {
            main { margin-left: 0; transition: 0.3s; padding-top: 110px !important; }
            .mobile-header { display: flex !important; }
        }
        
        .dashboard-header-fix { margin-top: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden flex-col md:flex-row">

    <div id="auth-screen">
        <div class="auth-card glass-card shadow-2xl p-10 w-full max-w-[420px] mx-4">
            <div class="text-center mb-8">
                <div class="inline-flex p-4 bg-blue-50 rounded-3xl mb-4"><i class="fa-solid fa-shield-halved text-4xl text-blue-600"></i></div>
                <h2 class="text-3xl font-black text-slate-800">AZL <span class="text-blue-600">Training</span></h2>
            </div>
            <div id="login-form" class="space-y-4">
                <input type="text" id="login-phone" placeholder="Mobil nömrə" class="w-full p-4 rounded-2xl border border-slate-200 font-bold outline-none">
                <input type="password" id="login-pass" placeholder="Şifrə" class="w-full p-4 rounded-2xl border border-slate-200 font-bold outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black uppercase tracking-widest">Giriş et</button>
                <p class="text-center text-[11px] font-bold text-slate-500">Hesabınız yoxdur? <span onclick="toggleAuth(false)" class="text-blue-600 cursor-pointer">Yeni qeydiyyat</span></p>
            </div>
            <div id="register-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-name" placeholder="Ad" class="p-4 rounded-xl border border-slate-200 font-bold">
                    <input type="text" id="reg-surname" placeholder="Soyad" class="p-4 rounded-xl border border-slate-200 font-bold">
                </div>
                <input type="text" id="reg-phone" placeholder="Mobil nömrə" class="w-full p-4 rounded-xl border border-slate-200 font-bold">
                <input type="password" id="reg-pass" placeholder="Şifrə" class="w-full p-4 rounded-xl border border-slate-200 font-bold">
                <button onclick="handleRegister()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black uppercase">Təsdiqlə</button>
                <p class="text-center text-[11px] font-bold text-slate-500"><span onclick="toggleAuth(true)" class="text-blue-600 cursor-pointer">Geri dön</span></p>
            </div>
        </div>
    </div>

    <div id="mobile-overlay" onclick="toggleSidebar()"></div>

    <div id="main-app" class="main-container h-full w-full flex flex-col md:flex-row">
        <aside id="sidebar" class="w-72 bg-white dark:bg-[#020617] border-r border-slate-200 dark:border-white/5 h-full flex flex-col p-8 shrink-0">
            <div class="mb-12 flex items-center justify-between">
                <div class="flex items-center gap-1 cursor-pointer">
                    <span class="font-black text-2xl text-blue-600">AZL</span>
                    <span class="font-medium text-2xl dark:text-white ml-1">Training</span>
                </div>
                <button onclick="toggleSidebar()" class="text-slate-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <nav class="flex flex-col w-full gap-1 flex-1">
                <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-btn nav-active"><i class="fa-solid fa-chart-pie"></i> <span data-i18n="nav_home">Dashboard</span></button>
                <button onclick="showSection('checklist')" id="nav-checklist" class="nav-btn"><i class="fa-solid fa-list-check"></i> <span data-i18n="nav_checklist">Checklist</span></button>
                <button onclick="showSection('ziyaretler')" id="nav-visits" class="nav-btn"><i class="fa-solid fa-map-location-dot"></i> <span data-i18n="nav_visits">Ziyarətlər</span></button>
                <button onclick="showSection('ayarlar')" id="nav-settings" class="nav-btn"><i class="fa-solid fa-sliders"></i> <span data-i18n="nav_settings">Ayarlar</span></button>
            </nav>
            <div class="mt-auto pt-6 border-t border-slate-100">
                <button onclick="openNewChecklist()" class="w-full bg-blue-600 text-white py-4 rounded-2xl shadow-xl font-black text-xs uppercase flex items-center justify-center gap-3 hover:scale-[1.02] transition-transform"><i class="fas fa-plus-circle text-lg"></i> Yeni Checklist</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative">
            <div class="mobile-header">
                <button onclick="toggleSidebar()" class="text-blue-600 text-2xl mr-4"><i class="fa-solid fa-bars"></i></button>
                <span class="font-black text-xl text-blue-600">AZL <span class="text-slate-800 dark:text-white font-medium">Training</span></span>
            </div>

            <div class="p-6 md:p-10 max-w-7xl mx-auto dashboard-header-fix">
                <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-10">
                    <div>
                        <h1 id="page-title" data-i18n="dash_title" class="text-2xl md:text-3xl font-black dark:text-white uppercase text-blue-600 tracking-tighter">PERFORMANS ANALİZİ</h1>
                        <p id="welcome-message" class="text-[12px] font-black text-slate-400 mt-1 uppercase tracking-wider"></p>
                    </div>
                    <div class="w-full lg:w-auto">
                        <select id="rep-selector" onchange="updateDashboard()" class="glass-card w-full px-6 py-3 font-black text-xs min-w-[220px] outline-none">
                            <option value="" data-i18n="all_reps">Bütün Nümayəndələr</option>
                            <option value="Zaur Xalinbekov">Zaur Xalinbekov</option>
                            <option value="Anar Babayev">Anar Babayev</option>
                            <option value="Emil Hüseynov">Emil Hüseynov</option>
                            <option value="Təvəkkül Abdullayev">Təvəkkül Abdullayev</option>
                            <option value="Loğman Əliyev">Loğman Əliyev</option>
                        </select>
                    </div>
                </header>

                <div id="dashboard" class="section-content active space-y-8">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="stat-card glass-card p-6 md:p-8 bg-gradient-to-br from-blue-600 to-blue-500 text-white">
                            <p class="text-[10px] font-black uppercase mb-2" data-i18n="stat_avg">Ortalama Bal</p>
                            <h3 id="rep-avg-stat" class="text-3xl md:text-4xl font-black">0</h3><i class="fa-solid fa-star"></i>
                        </div>
                        <div class="stat-card glass-card p-6 md:p-8 bg-gradient-to-br from-emerald-600 to-emerald-500 text-white">
                            <p class="text-[10px] font-black uppercase mb-2" data-i18n="stat_last">Ən Yüksək Bal</p>
                            <h3 id="last-point-score" class="text-3xl md:text-4xl font-black">0</h3><i class="fa-solid fa-ranking-star"></i>
                        </div>
                        <div class="stat-card glass-card p-6 md:p-8 bg-gradient-to-br from-amber-500 to-orange-400 text-white">
                            <p class="text-[10px] font-black uppercase mb-2" data-i18n="stat_count">Ziyarət Sayı</p>
                            <h3 id="total-visits-stat" class="text-3xl md:text-4xl font-black">0</h3><i class="fa-solid fa-person-walking-luggage"></i>
                        </div>
                        <div class="stat-card glass-card p-6 md:p-8 bg-gradient-to-br from-rose-500 to-pink-500 text-white">
                            <p class="text-[10px] font-black uppercase mb-2" data-i18n="stat_trend">İnkişaf Trendi</p>
                            <h3 id="trend-stat" class="text-3xl md:text-4xl font-black">0%</h3><i class="fa-solid fa-chart-line"></i>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 glass-card p-4 md:p-8 h-[350px] md:h-[450px]"><canvas id="rankingChart"></canvas></div>
                        <div class="glass-card p-4 md:p-8 h-[350px] md:h-[450px] flex items-center justify-center"><canvas id="radarChart"></canvas></div>
                    </div>
                </div>

                <div id="checklist" class="section-content">
                    <div id="checklist-history-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-6xl mx-auto"></div>
                </div>

                <div id="new-checklist-form" class="section-content">
                    <div class="max-w-4xl mx-auto space-y-6 pb-32">
                        <div class="glass-card p-6 md:p-8 shadow-sm">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-4" data-i18n="input_code">Satış Nöqtəsi Kodu:</label>
                            <input type="text" id="point-code-input" placeholder="Məs: 11604.0001" class="w-full bg-slate-50 dark:bg-white/5 p-4 md:p-6 rounded-2xl font-black text-xl md:text-2xl outline-none border border-transparent focus:border-blue-500 transition-all">
                        </div>
                        <div id="dynamic-questions" class="space-y-6 md:space-y-8"></div>
                        <div class="glass-card p-6 md:p-10 flex flex-col sm:flex-row gap-4 md:gap-6 shadow-2xl">
                            <button id="geo-btn" onclick="getLocation()" class="flex-1 bg-amber-500 text-white font-black p-5 md:p-6 rounded-3xl" data-i18n="btn_checkin">Check-in et</button>
                            <button onclick="processAndSave()" class="flex-1 bg-blue-600 text-white font-black p-5 md:p-6 rounded-3xl uppercase" data-i18n="btn_save">Saxla və Bitir</button>
                        </div>
                    </div>
                </div>
                
                <div id="ayarlar" class="section-content">
                    <div class="max-w-4xl mx-auto space-y-6">
                        <div class="glass-card p-6 md:p-8 flex items-center justify-between flex-wrap gap-4">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 md:w-16 md:h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-xl md:text-2xl font-black" id="profile-initials">AZ</div>
                                <div>
                                    <h3 class="text-lg md:text-xl font-black dark:text-white" id="profile-name">İstifadəçi Adı</h3>
                                    <p class="text-[10px] text-slate-400 uppercase font-bold" data-i18n="nav_settings">Ayarlar</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 ml-auto">
                                <i class="fa-solid fa-moon text-slate-400"></i>
                                <label class="switch">
                                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="glass-card p-6 md:p-8">
                                <h4 class="font-black text-blue-600 mb-6 uppercase text-[10px]" data-i18n="lang_selection">Dil Seçimləri</h4>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="changeLanguage('az')" class="p-3 border rounded-xl font-bold text-xs hover:bg-blue-50 dark:hover:bg-slate-800 transition-colors">Azərbaycan 🇦🇿</button>
