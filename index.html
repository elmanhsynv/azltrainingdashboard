    <style>
        :root { --primary: #3b82f6; }
        body { transition: 0.4s; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); color: #1e293b; overflow-x: hidden; }
        .dark body { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); color: #f1f5f9; }
        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); border-radius: 2rem; background: rgba(255, 255, 255, 0.85); transition: all 0.3s ease; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.7); border-color: rgba(255, 255, 255, 0.08); }
        .stat-card { position: relative; overflow: hidden; border: none !important; transition: all 0.4s ease; }
        .stat-card:hover { transform: translateY(-8px); }
        .stat-card i { position: absolute; right: -15px; bottom: -15px; font-size: 6rem; opacity: 0.15; color: white; }
        .nav-btn { padding: 0.8rem 1.5rem; margin: 4px 0; font-size: 14px; display: flex; align-items: center; gap: 12px; border-radius: 1rem; color: #64748b; transition: 0.3s; }
        .nav-active { background: var(--primary) !important; color: white !important; box-shadow: 0 8px 20px -5px rgba(59, 130, 246, 0.4); }
        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .section-content { display: none; width: 100%; }
        .section-content.active { display: block; }
        .check-btn-v4 { width: 50px; height: 45px; border-radius: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; }
        .btn-success-active { background: #10b981 !important; color: white !important; }
        .btn-danger-active { background: #ef4444 !important; color: white !important; }

        #map { height: 500px !important; width: 100%; border-radius: 2rem; z-index: 1; }
        
        /* Switch Style */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBBP5rDA_iLkwLGswMI8gAaTzpgqKQ5rf4",
            authDomain: "azl-training.firebaseapp.com",
            databaseURL: "https://azl-training-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "azl-training",
            storageBucket: "azl-training.firebasestorage.app",
            messagingSenderId: "467979610103",
            appId: "1:467979610103:web:c1ca6e75aa4116cd73b0f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('azl_user')) || null;
        let database = {}; 
        let rankingChart, radarChart, map;
        let currentCoords = null;
        let currentLang = localStorage.getItem('azl_lang') || 'az';
        let reportType = 'daily';

        const trans = {
            az: { nav_home: "Dashboard", nav_checklist: "Checklist", nav_visits: "Ziyarətlər", nav_settings: "Ayarlar", stat_avg: "Ortalama Bal", stat_last: "Ən Yüksək Bal", stat_count: "Ziyarət Sayı", stat_trend: "Trend", btn_quick_create: "Yeni Checklist", dash_title: "PERFORMANS ANALİZİ", form_title: "Məlumat Girişi", input_code: "Satış Nöqtəsi Kodu:", btn_checkin: "Check-in", btn_save: "Yadda Saxla", lang_selection: "Dil Seçimləri", internal_report: "Daxili Hesabat", rep_selection: "Hesabat Çıxarma", all_reps: "Bütün Nümayəndələr" },
            tr: { nav_home: "Panel", nav_checklist: "Kontrol Listesi", nav_visits: "Ziyaretler", nav_settings: "Ayarlar", stat_avg: "Ortalama Skor", stat_last: "En Yüksek Skor", stat_count: "Ziyaret Sayısı", stat_trend: "Eğilim", btn_quick_create: "Yeni Liste", dash_title: "PERFORMANS ANALİZİ", form_title: "Veri Girişi", input_code: "Satış Noktası Kodu:", btn_checkin: "Giriş Yap", btn_save: "Kaydet", lang_selection: "Dil Seçenekleri", internal_report: "Dahili Rapor", rep_selection: "Rapor Al", all_reps: "Tüm Temsilciler" },
            en: { nav_home: "Dashboard", nav_checklist: "Checklist", nav_visits: "Visits", nav_settings: "Settings", stat_avg: "Average Score", stat_last: "Max Score", stat_count: "Visits Count", stat_trend: "Trend", btn_quick_create: "New Checklist", dash_title: "PERFORMANCE ANALYSIS", form_title: "Data Entry", input_code: "Sales Point Code:", btn_checkin: "Check-in", btn_save: "Save", lang_selection: "Language Options", internal_report: "Internal Report", rep_selection: "Get Report", all_reps: "All Representatives" },
            ru: { nav_home: "Панель", nav_checklist: "Чек-лист", nav_visits: "Визиты", nav_settings: "Настройки", stat_avg: "Средний балл", stat_last: "Макс. балл", stat_count: "Визиты", stat_trend: "Тренд", btn_quick_create: "Создать", dash_title: "АНАЛИЗ", form_title: "Ввод данных", input_code: "Код точки:", btn_checkin: "Чек-ин", btn_save: "Сохранить", lang_selection: "Выбор языка", internal_report: "Внутренний отчет", rep_selection: "Извлечь отчет", all_reps: "Все представители" }
        };

        function applyTrans() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (trans[currentLang][key]) {
                    if (el.tagName === 'INPUT') el.placeholder = trans[currentLang][key];
                    else el.innerText = trans[currentLang][key];
                }
            });
            // Update Select placeholders
            const repSelect = document.getElementById('rep-selector');
            if(repSelect) repSelect.options[0].text = trans[currentLang].all_reps;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('azl_lang', lang);
            applyTrans();
            updateDashboard();
        }

        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('az-AZ', { day: 'numeric', month: 'long', year: 'numeric' }).format(new Date());

        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
        }

        async function handleRegister() {
            const phone = document.getElementById('reg-phone').value.trim().replace(/\s+/g, '');
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            const surname = document.getElementById('reg-surname').value;
            if(!phone || !pass || !name) return alert("Məlumatları tam daxil edin.");
            await db.ref('users/' + phone).set({ name, surname, phone, pass, fullName: name + ' ' + surname });
            alert("Qeydiyyat tamamlandı!"); toggleAuth(true);
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim().replace(/\s+/g, '');
            const pass = document.getElementById('login-pass').value;
            try {
                const snap = await db.ref('users').child(phone).once('value');
                const user = snap.val();
                if(user && user.pass === pass) {
                    currentUser = user;
                    localStorage.setItem('azl_user', JSON.stringify(user));
                    initApp();
                } else alert("Məlumatlar yanlışdır.");
            } catch(e) { alert("Giriş xətası!"); }
        }

        function logout() { localStorage.removeItem('azl_user'); location.reload(); }

        function initApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-name').innerText = currentUser.fullName || currentUser.name;
            document.getElementById('profile-initials').innerText = currentUser.name[0] + (currentUser.surname ? currentUser.surname[0] : "");
            
            db.ref('visits').on('value', snap => {
                const data = snap.val();
                database = {};
                if(data) Object.values(data).forEach(v => {
                    if(!database[v.rep]) database[v.rep] = [];
                    database[v.rep].push(v);
                });
                updateDashboard();
            });
            applyTrans();
        }

        function updateDashboard() {
            const selectedRep = document.getElementById('rep-selector').value;
            let allVisits = [];
            Object.values(database).forEach(v => allVisits = allVisits.concat(v));
            allVisits.sort((a,b) => b.timestamp - a.timestamp);
            const filtered = selectedRep ? (database[selectedRep] || []) : allVisits;

            document.getElementById('total-visits-stat').innerText = filtered.length;
            const avg = filtered.length ? (filtered.reduce((a,b) => a + b.score, 0) / filtered.length).toFixed(0) : 0;
            document.getElementById('rep-avg-stat').innerText = avg;
            document.getElementById('last-point-score').innerText = filtered.length ? Math.max(...filtered.map(v => v.score)) : 0;

            updateCharts(selectedRep, filtered);
            renderHistory(filtered);
        }

        function updateCharts(repName, filtered) {
            const ctxR = document.getElementById('rankingChart').getContext('2d');
            const labels = Object.keys(database);
            const scores = labels.map(r => (database[r].reduce((a,b)=>a+b.score,0)/database[r].length).toFixed(1));
            if(rankingChart) rankingChart.destroy();
            rankingChart = new Chart(ctxR, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Ortalama', data: scores, backgroundColor: '#3b82f6', borderRadius: 10 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            const radarData = filtered.length ? filtered[0].catData : [0,0,0,0,0];
            if(radarChart) radarChart.destroy();
            radarChart = new Chart(ctxRadar, {
                type: 'radar',
                data: { labels:['4+4','B.Beş','S.Keno','Poz-Q','Term'], datasets:[{ data:radarData, backgroundColor:'rgba(59,130,246,0.2)', borderColor:'#3b82f6' }] },
                options: { scales: { r: { min: 0, max: 100 } } }
            });
        }

        function renderHistory(entries) {
            const list = document.getElementById('checklist-history-list');
            list.innerHTML = entries.map(e => `
                <div class="glass-card p-6 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-black text-blue-600 text-xl">${e.code}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${e.rep} • ${e.date}</p>
                    </div>
                    <div class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl font-black">${e.score}</div>
                </div>
            `).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            const btn = document.getElementById('nav-' + id);
            if(btn) btn.classList.add('nav-active');
            if(id === 'ziyaretler') setTimeout(initMap, 400);
            applyTrans();
        }

        function initMap() {
            if(map) { map.remove(); }
            map = L.map('map').setView([40.4093, 49.8671], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            Object.values(database).flat().forEach(e => {
                if(e.coords && e.coords.lat) {
                    L.marker([e.coords.lat, e.coords.lng]).addTo(map).bindPopup(`<b>${e.rep}</b><br>${e.code}`);
                }
            });
            map.invalidateSize();
        }

        function toggleTheme() {
            const isDark = document.getElementById('theme-toggle').checked;
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Internal Report Logic
        function setReportType(type) {
            reportType = type;
            document.getElementById('btn-daily').className = type === 'daily' ? 'flex-1 p-4 border-2 border-blue-600 bg-blue-50 dark:bg-blue-900/20 rounded-2xl font-black text-sm text-blue-600' : 'flex-1 p-4 border-2 rounded-2xl font-black text-sm text-slate-400';
            document.getElementById('btn-weekly').className = type === 'weekly' ? 'flex-1 p-4 border-2 border-blue-600 bg-blue-50 dark:bg-blue-900/20 rounded-2xl font-black text-sm text-blue-600' : 'flex-1 p-4 border-2 rounded-2xl font-black text-sm text-slate-400';
            generateInternalReport();
        }

        function generateInternalReport() {
            const dateVal = document.getElementById('report-date').value;
            if(!dateVal) return;
            const selectedDate = new Date(dateVal);
            let filtered = [];
            const allVisits = Object.values(database).flat();

            if(reportType === 'daily') {
                const targetStr = selectedDate.toLocaleDateString('az-AZ');
                filtered = allVisits.filter(v => v.date === targetStr);
            } else {
                const startOfWeek = new Date(selectedDate);
                startOfWeek.setDate(selectedDate.getDate() - (selectedDate.getDay() === 0 ? 6 : selectedDate.getDay() - 1));
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(startOfWeek.getDate() + 6);
                filtered = allVisits.filter(v => {
                    const vDate = new Date(v.timestamp);
                    return vDate >= startOfWeek && vDate <= endOfWeek;
                });
            }

            const resultsDiv = document.getElementById('internal-report-results');
            if(filtered.length === 0) {
                resultsDiv.innerHTML = `<div class="p-6 bg-slate-50 dark:bg-slate-800 rounded-3xl text-center text-slate-400 font-bold">Məlumat tapılmadı</div>`;
            } else {
                resultsDiv.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-3xl text-center">
                            <p class="text-[10px] font-black text-blue-600 uppercase">Ziyarət</p>
                            <h5 class="text-2xl font-black text-blue-600">${filtered.length}</h5>
                        </div>
                        <div class="p-6 bg-emerald-50 dark:bg-emerald-900/20 rounded-3xl text-center">
                            <p class="text-[10px] font-black text-emerald-600 uppercase">Ortalama</p>
                            <h5 class="text-2xl font-black text-emerald-600">${(filtered.reduce((a,b)=>a+b.score,0)/filtered.length).toFixed(0)}</h5>
                        </div>
                    </div>
                `;
            }
        }

        function downloadReport() {
            const rep = document.getElementById('report-rep-selector').value;
            if(!rep) return alert("Nümayəndə seçin!");
            const data = database[rep] || [];
            if(data.length === 0) return alert("Məlumat tapılmadı!");
            const csvContent = "data:text/csv;charset=utf-8,Kod,Bal,Tarix\n" + data.map(e => `${e.code},${e.score},${e.date}`).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Report_${rep.replace(" ","_")}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        function openNewChecklist() { showSection('new-checklist-form'); renderForm(); }
        function renderForm() {
            const schema = [{ cat: "4+4 Oyunu", questions: ["Oyun qaydalarını bilir?", "Cekpotu tanıyır?"] }, { cat: "Terminal", questions: ["Hesabat çıxara bilir?", "Ləğv edə bilir?"] }];
            let h = "";
            schema.forEach((group, gIdx) => {
                h += `<div class="glass-card p-8"><h3 class="font-black text-blue-600 mb-4">${group.cat}</h3>`;
                group.questions.forEach((q, qIdx) => {
                    h += `<div class="flex justify-between items-center py-4 border-b"><p class="font-bold">${q}</p><div class="flex gap-2"><button onclick="this.className='w-10 h-10 rounded bg-green-500 text-white'" class="w-10 h-10 border rounded">Y</button><button onclick="this.className='w-10 h-10 rounded bg-red-500 text-white'" class="w-10 h-10 border rounded">X</button></div></div>`;
                });
                h += `</div>`;
            });
            document.getElementById('dynamic-questions').innerHTML = h;
        }

        function processAndSave() {
            const code = document.getElementById('point-code-input').value;
            const rep = currentUser.fullName || "Anonim";
            const visit = { rep, code, score: 85, date: new Date().toLocaleDateString('az-AZ'), timestamp: Date.now(), catData: [80, 75, 90, 85, 70], coords: currentCoords };
            db.ref('visits').push(visit).then(() => showSection('dashboard'));
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geo-btn').innerText = "📍 MƏKAN OK";
                    document.getElementById('geo-btn').classList.add('bg-green-600');
                });
            }
        }

        window.onload = () => { 
            const theme = localStorage.getItem('theme');
            if(theme === 'dark') {
                document.documentElement.classList.add('dark');
                if(document.getElementById('theme-toggle')) document.getElementById('theme-toggle').checked = true;
            }
            if(currentUser) initApp(); 
        };
    </script>
</body>
</html>
