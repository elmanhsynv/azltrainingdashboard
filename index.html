        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
        }

        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const surname = document.getElementById('reg-surname').value;
            const phone = document.getElementById('reg-phone').value.trim();
            const pass = document.getElementById('reg-pass').value;
            if(!name || !phone || !pass) return alert("Xanaları doldurun!");
            const phoneClean = phone.replace(/\s+/g, ''); // Bütün boşluqları silir
            const snap = await db.ref('users').child(phoneClean).once('value');
            if(snap.exists()) return alert("Bu nömrə artıq var!");
            await db.ref('users/' + phone).set({ name, surname, phone, pass, fullName: name + ' ' + surname });
            alert("Uğurlu!"); toggleAuth(true);
        }

        async function handleLogin() {
    const phone = document.getElementById('login-phone').value.trim();
    const pass = document.getElementById('login-pass').value;

    if(!phone || !pass) return alert("Xanaları doldurun!");

    try {
        // Nömrəni bazadan birbaşa axtarırıq
        const snap = await db.ref('users').child(phone).once('value');
        const user = snap.val();

        if(user) {
            if(user.pass === pass) {
                currentUser = user;
                localStorage.setItem('azl_user', JSON.stringify(user));
                initApp();
            } else {
                alert("Şifrə yanlışdır!");
            }
        } else {
            alert("Bu nömrə ilə istifadəçi tapılmadı! (Daxil edilən: " + phone + ")");
        }
    } catch(e) {
        console.error(e);
        // Burada xətanın əsl səbəbini görəcəyik
        alert("Firebase Xətası: " + e.message); 
    }
}

        function logout() { localStorage.removeItem('azl_user'); location.reload(); }

        function saveProfile() {
            const upd = { name: document.getElementById('edit-name').value, surname: document.getElementById('edit-surname').value, birth: document.getElementById('edit-birth').value, fullName: document.getElementById('edit-name').value + ' ' + document.getElementById('edit-surname').value, pic: document.getElementById('profile-img').src };
            db.ref('users/' + currentUser.phone).update(upd).then(() => { currentUser = {...currentUser, ...upd}; localStorage.setItem('azl_user', JSON.stringify(currentUser)); initApp(); alert("Profil yeniləndi!"); });
        }

        function previewPic(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => document.getElementById('profile-img').src = e.target.result; reader.readAsDataURL(input.files[0]); } }

        async function initApp() {
            if(!currentUser) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').classList.add('authenticated');
            document.getElementById('user-welcome').innerText = "Xoş gəldiniz, " + currentUser.name;
            
            db.ref('visits').on('value', snap => {
                database = {}; const data = snap.val();
                if(data) Object.values(data).forEach(e => { if(!database[e.rep]) database[e.rep] = []; database[e.rep].push(e); });
                updateDashboard();
            });
            applyTrans();
        }

        function changeLanguage(l) { currentLang = l; localStorage.setItem('azl_lang', l); applyTrans(); updateDashboard(); }
        
        function applyTrans() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (trans[currentLang][key]) {
                    if (el.tagName === 'INPUT') {
                        el.placeholder = trans[currentLang][key];
                    } else if (el.tagName === 'OPTION') {
                        el.text = trans[currentLang][key];
                    } else {
                        // Sol paneldəki ikonu qorumaq üçün hədəf <span> teqini tapırıq
                        const span = el.querySelector('span');
                        if (span) {
                            span.innerText = trans[currentLang][key];
                        } else {
                            // Əgər span yoxdursa (məs: stat card p teqləri), mətni birbaşa dəyiş
                            el.innerText = trans[currentLang][key];
                        }
                    }
                }
            });
        }

        function openNewChecklist() { showSection('new-checklist-form'); renderForm(); }
        function renderForm() {
            let h = "";
            checklistSchema.forEach((group, gIdx) => {
                h += `<div class="glass-card p-8 space-y-6"><h3 class="font-black text-blue-600 uppercase text-xs tracking-widest border-b pb-4">${group.cat}</h3><div class="space-y-6">`;
                group.questions.map((q, qIdx) => {
                    h += `<div class="flex justify-between items-center gap-4 border-b border-slate-50 dark:border-white/5 pb-6"><p class="text-slate-600 dark:text-slate-300 font-bold text-lg">${q}</p><div class="flex gap-4"><button onclick="setAnswer(${gIdx}, ${qIdx}, true, this)" class="q-btn-${gIdx}-${qIdx} check-btn-v4"><i class="fas fa-check"></i></button><button onclick="setAnswer(${gIdx}, ${qIdx}, false, this)" class="q-btn-${gIdx}-${qIdx} check-btn-v4"><i class="fas fa-times"></i></button></div></div>`;
                });
                h += `</div></div>`;
            });
            document.getElementById('dynamic-questions').innerHTML = h;

            let fh = "";
            feedbackSchema.forEach(f => {
                fh += `<div class="glass-card p-8 space-y-6"><div class="flex justify-between items-center gap-4"><label class="text-lg font-black text-slate-700 dark:text-slate-200">${f.label}</label><div class="flex gap-4">${f.options.map(opt => `<button id="btn-${f.id}-${opt}" onclick="setChoice('${f.id}', '${opt}')" class="btn-${f.id} px-8 py-3 rounded-2xl font-black text-[11px] uppercase bg-slate-100 dark:bg-white/5">${opt}</button>`).join('')}</div></div><textarea id="note-${f.id}" placeholder="Qeyd..." class="custom-textarea h-32"></textarea></div>`;
            });
            document.getElementById('feedback-section').innerHTML = fh;
        }

        function setAnswer(g, q, v, b) { if(!currentAnswers[g]) currentAnswers[g] = {}; currentAnswers[g][q] = v; document.querySelectorAll(`.q-btn-${g}-${q}`).forEach(el => el.className = "check-btn-v4"); b.className += v ? " btn-success-active" : " btn-danger-active"; }
        function setChoice(id, opt) { currentChoices[id] = opt; document.querySelectorAll(`.btn-${id}`).forEach(el => el.className = `btn-${id} px-8 py-3 rounded-2xl font-black text-[11px] uppercase bg-slate-100 dark:bg-white/5`); const b = document.getElementById(`btn-${id}-${opt}`); b.className += (opt.includes('Yaxşı') || opt.includes('Aktiv')) ? " btn-success-active" : " btn-danger-active"; }

        function processAndSave() {
            const code = document.getElementById('point-code-input').value;
            const rep = document.getElementById('form-rep-selector').value;
            if(!code) return alert("Kod!");
            const visit = { rep, submittedBy: currentUser.fullName, code, score: Math.floor(Math.random()*40)+60, date: new Date().toLocaleDateString('az-AZ'), timestamp: Date.now(), coords: currentCoords, catData: [80, 75, 90, 85, 70] };
            db.ref('visits').push(visit).then(() => { showSection('dashboard'); currentAnswers = {}; currentChoices = {}; });
        }

        function updateDashboard() {
            const rep = document.getElementById('rep-selector').value;
            const entries = rep ? database[rep] || [] : Object.values(database).flat().sort((a,b)=>b.timestamp-a.timestamp);
            document.getElementById('total-visits-stat').innerText = entries.length;
            document.getElementById('rep-avg-stat').innerText = entries.length ? (entries.reduce((a,b)=>a+b.score,0)/entries.length).toFixed(0) : 0;
            document.getElementById('last-point-score').innerText = entries.length ? entries[0].score : 0;
            
            if (entries.length > 1) {
                const currentScore = entries[0].score;
                const prevScore = entries[1].score;
                const diff = currentScore - prevScore;
                document.getElementById('trend-stat').innerText = (diff >= 0 ? "+" : "") + diff + "%";
            } else {
                document.getElementById('trend-stat').innerText = "0%";
            }

            if(radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart'), { type: 'radar', data: { labels: ['4+4','B.Beş','S.Keno','Poz-Q','Term'], datasets: [{data: entries.length?entries[0].catData:[0,0,0,0,0], backgroundColor:'rgba(59,130,246,0.1)', borderColor:'#3b82f6'}] }, options: { plugins:{legend:{display:false}}, scales:{r:{min:0, max:100, ticks:{display:false}}} } });
            renderHistory(entries);
        }

        function renderHistory(entries) {
            document.getElementById('checklist-history-list').innerHTML = entries.slice(0, 15).map(e => `<div class="p-6 glass-card flex justify-between items-center shadow-lg"><div><p class="font-black text-blue-600 text-xl">${e.code}</p><p class="text-[9px] text-slate-400 font-black uppercase">${e.rep} • ${e.date}</p></div><div class="bg-blue-600 text-white px-8 py-2 rounded-2xl font-black text-2xl">${e.score}</div></div>`).join('');
        }

        function getLocation() { if (navigator.geolocation) { navigator.geolocation.getCurrentPosition(pos => { currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; document.getElementById('geo-btn').innerText = "📍 MƏKAN OK"; document.getElementById('geo-btn').classList.replace('bg-amber-500', 'bg-emerald-500'); }); } }

        function initMap() {
            if(map) map.remove();
            map = L.map('map').setView([40.4093, 49.8671], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            Object.values(database).flat().forEach(e => { if(e.coords) L.marker([e.coords.lat, e.coords.lng]).addTo(map).bindPopup(`<b>${e.rep}</b><br>${e.code}`); });
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); if(b.getAttribute('onclick').includes(id)) b.classList.add('nav-active'); });
            if(id === 'ziyaretler') setTimeout(initMap, 400);
            applyTrans();
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); document.getElementById('mode-icon').className = document.documentElement.classList.contains('dark') ? "fas fa-moon text-blue-400" : "fas fa-sun text-amber-500"; }
        if(currentUser) initApp();
    </script>
</body>
</html>
