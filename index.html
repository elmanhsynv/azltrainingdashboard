    <script>
        const firebaseConfig = {

            databaseURL: "https://azl-training-default-rtdb.europe-west1.firebasedatabase.app",

            appId: "1:467979610103:web:c1ca6e75aa4116cd73b0f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('azl_user')) || null;
        let database = {}; 
        let map, currentCoords = null;
        let rankingChart, radarChart;
        let currentLang = localStorage.getItem('azl_lang') || 'az';

        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('az-AZ', { day: 'numeric', month: 'long', year: 'numeric' }).format(new Date());

        const trans = {

            tr: { nav_home: "Panel", nav_checklist: "Kontrol Listesi", nav_visits: "Ziyaretler", nav_settings: "Ayarlar", stat_avg: "Ortalama", stat_last: "En Yüksek", stat_count: "Ziyaret", stat_trend: "Trend", btn_quick_create: "Yeni Kayıt", dash_title: "PERFORMANS ANALİZİ", form_title: "Veri Girişi", input_code: "Nokta Kodu:", btn_checkin: "Check-in", btn_save: "Kaydet" },
            en: { nav_home: "Dashboard", nav_checklist: "Checklist", nav_visits: "Visits", nav_settings: "Settings", stat_avg: "Avg Score", stat_last: "Best Score", stat_count: "Visits", stat_trend: "Trend", btn_quick_create: "New Entry", dash_title: "PERFORMANCE ANALYSIS", form_title: "Data Entry", input_code: "Point Code:", btn_checkin: "Check-in", btn_save: "Save" },

        };

        const checklistSchema = [
            { cat: "4+4 Oyunu", questions: ["4+4 oyunu nə zaman və harda keçirilir?", "4+4 oyununda necə iştirak etmək olar?", "4+4 oyununda güncəl cekpot nə qədərdir?", "4+4 oyununda minimum uduş nə qədərdir?"] },
            { cat: "BeşdəBeş Oyunu", questions: ["BeşdəBeş oyunu nə zaman və harada keçirilir?", "BeşdəBeş oyununda necə iştirak etmək olar?", "BeşdəBeş oyununda böyük uduş nə qədərdir?", "BeşdəBeş oyununda minimum uduş nə qədərdir?"] },
            { cat: "Super Keno", questions: ["Super Keno oyunu nə zaman və harada keçirilir?", "Super Keno oyununda necə iştirak etmək olar?", "Super Keno oyununda böyük uduş nə qədərdir?", "Super Keno oyununda uyğunluq necə olmalıdır?"] },
            { cat: "Poz-qazan / 1001 Sevinc", questions: ["Poz-qazan məhsullarının qiymətlərini bilirmi?", "Poz-qazan məhsullarını validasiya edə bilirmi?", "Ekspres Keno oyununda necə iştirak etmək olar?", "1001 Sevinc haqqında məlumatı varmı?"] },
            { cat: "Terminal İstifadəsi", questions: ["Terminala giriş-çıxış və keçidləri bilirmi?", "Tirajlı lotereyaların terminal funksiyalarını bilirmi?", "Ləğv/Yoxla/Skan et funksiyalarını bilirmi?", "Terminaldan hesabatları çəkə bilirmi?"] }
        ];

        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
        }

        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const surname = document.getElementById('reg-surname').value;
            const phone = document.getElementById('reg-phone').value.trim().replace(/\s+/g, '');
            const pass = document.getElementById('reg-pass').value;
            if(!name || !phone || !pass) return alert("Xanaları doldurun!");
            const snap = await db.ref('users').child(phone).once('value');
            if(snap.exists()) return alert("Bu nömrə artıq var!");
            await db.ref('users/' + phone).set({ name, surname, phone, pass, fullName: name + ' ' + surname });
            alert("Qeydiyyat uğurludur!"); toggleAuth(true);
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim().replace(/\s+/g, '');
            const pass = document.getElementById('login-pass').value;
            if(!phone || !pass) return alert("Xanaları doldurun!");

            try {
                const snap = await db.ref('users').child(phone).once('value');
                const user = snap.val();
                if(user && user.pass === pass) {
                    const safeUser = {...user}; delete safeUser.pic;
                    currentUser = user; localStorage.setItem('azl_user', JSON.stringify(safeUser));
                    initApp();
                } else alert("Nömrə və ya şifrə yanlışdır!");
            } catch(e) {
                if(e.name === 'QuotaExceededError') { localStorage.clear(); alert("Yaddaş təmizləndi, yenidən sınayın."); }
                else alert("Giriş xətası!");
            }
        }

        function logout() { localStorage.removeItem('azl_user'); location.reload(); }

        function saveProfile() {
            const pic = document.getElementById('profile-img').src;
            if(pic.length > 800000) return alert("Şəkil ölçüsü çox böyükdür!");
            const upd = { name: document.getElementById('edit-name').value, surname: document.getElementById('edit-surname').value, birth: document.getElementById('edit-birth').value, fullName: document.getElementById('edit-name').value + ' ' + document.getElementById('edit-surname').value, pic };
            db.ref('users/' + currentUser.phone).update(upd).then(() => {
                const safeUpd = {...upd}; delete safeUpd.pic;
                localStorage.setItem('azl_user', JSON.stringify(safeUpd));
                alert("Profil yeniləndi!"); location.reload();
            });
        }

        function previewPic(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => document.getElementById('profile-img').src = e.target.result; reader.readAsDataURL(input.files[0]); } }

        async function initApp() {
            if(!currentUser) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-welcome').innerText = "Xoş gəldiniz, " + currentUser.name;
            db.ref('visits').on('value', snap => {
                database = {}; const data = snap.val();
                if(data) Object.values(data).forEach(e => { if(!database[e.rep]) database[e.rep] = []; database[e.rep].push(e); });
                updateDashboard();
            });
            applyTrans();
        }

        function updateDashboard() {
            const selectedRep = document.getElementById('rep-selector').value;
            const allVisits = Object.values(database).flat().sort((a,b) => b.timestamp - a.timestamp);
            const filtered = selectedRep ? database[selectedRep] || [] : allVisits;

            document.getElementById('total-visits-stat').innerText = filtered.length;
            const avg = filtered.length ? (filtered.reduce((a,b)=>a+b.score,0)/filtered.length).toFixed(0) : 0;
            document.getElementById('rep-avg-stat').innerText = avg;
            document.getElementById('last-point-score').innerText = filtered.length ? Math.max(...filtered.map(v=>v.score)) : 0;

            if (filtered.length > 1) {
                const diff = filtered[0].score - (filtered[1] ? filtered[1].score : 0);
                document.getElementById('trend-stat').innerText = (diff >= 0 ? "+" : "") + diff + "%";
            }

            updateCharts(selectedRep, filtered);
            renderHistory(filtered);
        }

        function updateCharts(repName, filtered) {
            // Ranking Chart (Müqayisə)
            const ctxR = document.getElementById('rankingChart').getContext('2d');
            const labels = Object.keys(database);
            const scores = labels.map(r => (database[r].reduce((a,b)=>a+b.score,0)/database[r].length).toFixed(1));

            if(rankingChart) rankingChart.destroy();
            rankingChart = new Chart(ctxR, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Ortalama', data: scores, backgroundColor: '#3b82f6', borderRadius: 15, barThickness: 35 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{y:{max:100, grid:{display:false}}, x:{grid:{display:false}}} }
            });

            // Radar Chart
            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            const radarData = filtered.length ? filtered[0].catData : [0,0,0,0,0];
            if(radarChart) radarChart.destroy();
            radarChart = new Chart(ctxRadar, {
                type: 'radar',
                data: { labels:['4+4','B.Beş','S.Keno','Poz-Q','Term'], datasets:[{ data:radarData, backgroundColor:'rgba(59,130,246,0.2)', borderColor:'#3b82f6', borderWidth:3 }] },
                options: { plugins:{legend:{display:false}}, scales:{r:{min:0, max:100, ticks:{display:false}}} }
            });
        }

        function renderHistory(entries) {
            document.getElementById('checklist-history-list').innerHTML = entries.map(e => `
                <div class="glass-card p-6 flex justify-between items-center hover:scale-[1.02] transition-all">
                    <div>
                        <p class="font-black text-blue-600 text-xl">${e.code}</p>
                        <p class="text-[9px] text-slate-400 font-black uppercase">${e.rep} • ${e.date}</p>
                    </div>
                    <div class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl font-black">${e.score}</div>
                </div>
            `).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('nav-active');
                if(b.getAttribute('onclick').includes(id)) b.classList.add('nav-active');
            });
            if(id === 'ziyaretler') setTimeout(initMap, 400);
            applyTrans();
        }

        function applyTrans() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (trans[currentLang][key]) {
                    const span = el.querySelector('span');
                    if (span) span.innerText = trans[currentLang][key];
                    else if (el.tagName === 'INPUT') el.placeholder = trans[currentLang][key];
                    else el.innerText = trans[currentLang][key];
                }
            });
        }

        function initMap() {
            if(map) map.remove();
            map = L.map('map').setView([40.4093, 49.8671], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            Object.values(database).flat().forEach(e => { if(e.coords) L.marker([e.coords.lat, e.coords.lng]).addTo(map).bindPopup(`<b>${e.rep}</b><br>${e.code}`); });
        }

        function changeLanguage(l) { currentLang = l; localStorage.setItem('azl_lang', l); applyTrans(); updateDashboard(); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function openNewChecklist() { showSection('new-checklist-form'); renderForm(); }
        function getLocation() { if (navigator.geolocation) { navigator.geolocation.getCurrentPosition(pos => { currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; document.getElementById('geo-btn').innerText = "📍 MƏKAN OK"; document.getElementById('geo-btn').classList.replace('bg-amber-500', 'bg-emerald-500'); }); } }

        function renderForm() {
            let h = "";
            checklistSchema.forEach((group, gIdx) => {
                h += `<div class="glass-card p-8 space-y-6"><h3 class="font-black text-blue-600 uppercase text-xs tracking-widest border-b pb-4">${group.cat}</h3><div class="space-y-6">`;
                group.questions.map((q, qIdx) => {
                    h += `<div class="flex justify-between items-center gap-4 border-b border-slate-50 dark:border-white/5 pb-6">
                        <p class="text-slate-600 dark:text-slate-300 font-bold text-lg">${q}</p>
                        <div class="flex gap-4">
                            <button onclick="setAnswer(${gIdx}, ${qIdx}, true, this)" class="q-btn-${gIdx}-${qIdx} check-btn-v4"><i class="fas fa-check"></i></button>
                            <button onclick="setAnswer(${gIdx}, ${qIdx}, false, this)" class="q-btn-${gIdx}-${qIdx} check-btn-v4"><i class="fas fa-times"></i></button>
                        </div>
                    </div>`;
                });
                h += `</div></div>`;
            });
            document.getElementById('dynamic-questions').innerHTML = h;
        }

        let currentAnswers = {};
        function setAnswer(g, q, v, b) {
            if(!currentAnswers[g]) currentAnswers[g] = {}; 
            currentAnswers[g][q] = v;
            document.querySelectorAll(`.q-btn-${g}-${q}`).forEach(el => el.className = "check-btn-v4");
            b.className += v ? " btn-success-active" : " btn-danger-active";
        }

        function processAndSave() {
            const code = document.getElementById('point-code-input').value;
            const rep = document.getElementById('form-rep-selector').value;
            if(!code) return alert("Kod!");
            const visit = { rep, code, score: Math.floor(Math.random()*40)+60, date: new Date().toLocaleDateString('az-AZ'), timestamp: Date.now(), coords: currentCoords, catData: [80, 75, 90, 85, 70] };
            db.ref('visits').push(visit).then(() => { showSection('dashboard'); });
        }

        if(currentUser) initApp();
    </script>
</body>
</html>
